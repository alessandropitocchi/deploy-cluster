name: E2E Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    # Run e2e tests nightly
    - cron: '0 0 * * *'

jobs:
  e2e:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        k8s_version: [v1.31.0, v1.30.0]
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.21'

    - name: Set up Helm
      uses: azure/setup-helm@v4
      with:
        version: 'latest'

    - name: Install kind
      uses: helm/kind-action@v1
      with:
        version: v0.25.0
        install_only: true

    - name: Install kubectl
      uses: azure/setup-kubectl@v4
      with:
        version: 'v1.31.0'

    - name: Verify dependencies
      run: |
        kind version
        kubectl version --client
        helm version

    - name: Build klastr binary
      run: go build -o klastr ./cmd/deploycluster

    - name: Run e2e tests
      run: go test ./e2e/... -v -timeout 30m
      env:
        RUN_E2E: "1"
        K8S_VERSION: ${{ matrix.k8s_version }}

    - name: Cleanup clusters
      if: always()
      run: |
        kind delete clusters --all || true
