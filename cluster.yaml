name: my-cluster
provider:
    type: kind
cluster:
    controlPlanes: 1
    workers: 2
    version: v1.31.0
plugins:
    ingress:
        enabled: true
        type: nginx
    monitoring:
        enabled: true
        type: prometheus
        ingress:
            enabled: true
            host: grafana.localhost
    dashboard:
        enabled: true
        type: headlamp
        ingress:
            enabled: true
            host: headlamp.localhost
    argocd:
        enabled: true
        namespace: argocd
        version: stable
        ingress:
            enabled: true
            host: argocd.localhost
